AWSTemplateFormatVersion: "2010-09-09"
Description: >
  SIT233 Cloud Computing Final Project - Networking stack for a highly available
  WordPress deployment. This stack creates a separate CloudFormation-managed VPC
  with two public subnets, two private subnets, an Internet Gateway, a NAT Gateway,
  and public/private route tables across two Availability Zones.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Project naming
        Parameters:
          - ProjectName
      - Label:
          default: Network CIDR configuration
        Parameters:
          - VpcCidr
          - PublicSubnet1Cidr
          - PublicSubnet2Cidr
          - PrivateSubnet1Cidr
          - PrivateSubnet2Cidr
    ParameterLabels:
      ProjectName:
        default: Project name used for resource tags
      VpcCidr:
        default: VPC CIDR block
      PublicSubnet1Cidr:
        default: Public subnet 1 CIDR block
      PublicSubnet2Cidr:
        default: Public subnet 2 CIDR block
      PrivateSubnet1Cidr:
        default: Private subnet 1 CIDR block
      PrivateSubnet2Cidr:
        default: Private subnet 2 CIDR block

Parameters:
  ProjectName:
    Type: String
    Default: WordPress-CFN
    Description: Prefix used for resource names and tags.
    AllowedPattern: "^[a-zA-Z][a-zA-Z0-9-]*$"
    ConstraintDescription: Must start with a letter and contain only letters, numbers, and hyphens.

  VpcCidr:
    Type: String
    Default: 10.1.0.0/16
    Description: CIDR range for the CloudFormation test VPC. Different from the manual VPC.
    AllowedPattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/([0-9]|[1-2][0-9]|3[0-2])$"

  PublicSubnet1Cidr:
    Type: String
    Default: 10.1.1.0/24
    Description: CIDR range for public subnet 1 in the first Availability Zone.
    AllowedPattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/([0-9]|[1-2][0-9]|3[0-2])$"

  PublicSubnet2Cidr:
    Type: String
    Default: 10.1.2.0/24
    Description: CIDR range for public subnet 2 in the second Availability Zone.
    AllowedPattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/([0-9]|[1-2][0-9]|3[0-2])$"

  PrivateSubnet1Cidr:
    Type: String
    Default: 10.1.11.0/24
    Description: CIDR range for private subnet 1 in the first Availability Zone.
    AllowedPattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/([0-9]|[1-2][0-9]|3[0-2])$"

  PrivateSubnet2Cidr:
    Type: String
    Default: 10.1.12.0/24
    Description: CIDR range for private subnet 2 in the second Availability Zone.
    AllowedPattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/([0-9]|[1-2][0-9]|3[0-2])$"

Resources:
  WordPressVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-VPC"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Layer
          Value: Networking
        - Key: ManagedBy
          Value: CloudFormation

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-IGW"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Layer
          Value: Networking
        - Key: ManagedBy
          Value: CloudFormation

  AttachInternetGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref WordPressVPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref WordPressVPC
      CidrBlock: !Ref PublicSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-Public-Subnet-1"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Layer
          Value: Public
        - Key: ManagedBy
          Value: CloudFormation

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref WordPressVPC
      CidrBlock: !Ref PublicSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-Public-Subnet-2"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Layer
          Value: Public
        - Key: ManagedBy
          Value: CloudFormation

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref WordPressVPC
      CidrBlock: !Ref PrivateSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-Private-Subnet-1"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Layer
          Value: Private
        - Key: ManagedBy
          Value: CloudFormation

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref WordPressVPC
      CidrBlock: !Ref PrivateSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-Private-Subnet-2"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Layer
          Value: Private
        - Key: ManagedBy
          Value: CloudFormation

  NatGatewayEIP:
    Type: AWS::EC2::EIP
    DependsOn: AttachInternetGateway
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-NAT-EIP"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Layer
          Value: Networking
        - Key: ManagedBy
          Value: CloudFormation

  NatGateway:
    Type: AWS::EC2::NatGateway
    DependsOn:
      - NatGatewayEIP
      - PublicSubnet1
    Properties:
      AllocationId: !GetAtt NatGatewayEIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-NAT-Gateway"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Layer
          Value: Networking
        - Key: ManagedBy
          Value: CloudFormation

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref WordPressVPC
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-Public-RT"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Layer
          Value: Public
        - Key: ManagedBy
          Value: CloudFormation

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachInternetGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref WordPressVPC
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-Private-RT"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Layer
          Value: Private
        - Key: ManagedBy
          Value: CloudFormation

  PrivateDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: NatGateway
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

Outputs:
  VpcId:
    Description: CloudFormation-created VPC ID.
    Value: !Ref WordPressVPC
    Export:
      Name: !Sub "${AWS::StackName}-VpcId"

  VpcCidr:
    Description: CIDR range used by the CloudFormation-created VPC.
    Value: !Ref VpcCidr
    Export:
      Name: !Sub "${AWS::StackName}-VpcCidr"

  PublicSubnet1Id:
    Description: Public subnet 1 ID for the Application Load Balancer.
    Value: !Ref PublicSubnet1
    Export:
      Name: !Sub "${AWS::StackName}-PublicSubnet1Id"

  PublicSubnet2Id:
    Description: Public subnet 2 ID for the Application Load Balancer.
    Value: !Ref PublicSubnet2
    Export:
      Name: !Sub "${AWS::StackName}-PublicSubnet2Id"

  PrivateSubnet1Id:
    Description: Private subnet 1 ID for EC2 Auto Scaling and RDS.
    Value: !Ref PrivateSubnet1
    Export:
      Name: !Sub "${AWS::StackName}-PrivateSubnet1Id"

  PrivateSubnet2Id:
    Description: Private subnet 2 ID for EC2 Auto Scaling and RDS.
    Value: !Ref PrivateSubnet2
    Export:
      Name: !Sub "${AWS::StackName}-PrivateSubnet2Id"

  PublicRouteTableId:
    Description: Public route table with default route to Internet Gateway.
    Value: !Ref PublicRouteTable
    Export:
      Name: !Sub "${AWS::StackName}-PublicRouteTableId"

  PrivateRouteTableId:
    Description: Private route table with default route to NAT Gateway.
    Value: !Ref PrivateRouteTable
    Export:
      Name: !Sub "${AWS::StackName}-PrivateRouteTableId"

  InternetGatewayId:
    Description: Internet Gateway attached to the VPC.
    Value: !Ref InternetGateway
    Export:
      Name: !Sub "${AWS::StackName}-InternetGatewayId"

  NatGatewayId:
    Description: NAT Gateway placed in public subnet 1 for outbound private subnet access.
    Value: !Ref NatGateway
    Export:
      Name: !Sub "${AWS::StackName}-NatGatewayId"
