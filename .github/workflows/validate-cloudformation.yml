name: Validate CloudFormation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cfn-lint:
    name: cfn-lint
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cfn-lint
        run: python -m pip install --disable-pip-version-check "cfn-lint==1.52.1"

      - name: Show tool versions
        run: |
          python --version
          cfn-lint --version

      - name: Lint CloudFormation templates
        run: cfn-lint --non-zero-exit-code error -t networking.yaml application.yaml
