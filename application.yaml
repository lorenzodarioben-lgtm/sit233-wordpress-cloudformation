AWSTemplateFormatVersion: "2010-09-09"

Description: >
  SIT233 Cloud Computing Final Project - Application stack for a highly available
  WordPress deployment. This stack imports the separate networking stack and
  provisions the application layer: security groups, private S3 media bucket,
  Multi-AZ RDS, read replica, Application Load Balancer, Launch Template,
  Auto Scaling Group, and CPU-based scaling policies.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Project and imported network
        Parameters:
          - ProjectName
          - NetworkStackName

      - Label:
          default: EC2, AMI and access
        Parameters:
          - AmiId
          - KeyName
          - InstanceType

      - Label:
          default: Web tier capacity
        Parameters:
          - WebMinSize
          - WebDesiredCapacity
          - WebMaxSize

      - Label:
          default: WordPress bootstrap
        Parameters:
          - WordPressSiteTitle
          - WordPressAdminUser
          - WordPressAdminEmail

      - Label:
          default: RDS database
        Parameters:
          - DBName
          - DBUsername
          - DBInstanceClass
          - DBAllocatedStorage
          - DBEngineVersion
          - EnableRDSDeletionProtection

    ParameterLabels:
      ProjectName:
        default: Project name
      NetworkStackName:
        default: Existing networking stack name
      AmiId:
        default: AWS Academy custom WordPress AMI ID
      KeyName:
        default: AWS Academy EC2 key pair
      WebMinSize:
        default: Minimum web instances
      WebDesiredCapacity:
        default: Desired web instances
      WebMaxSize:
        default: Maximum web instances

Parameters:
  ProjectName:
    Type: String
    Default: WordPress-CFN
    Description: Prefix used for CloudFormation-created resources.
    AllowedPattern: "^[a-zA-Z][a-zA-Z0-9-]*$"
    ConstraintDescription: Must start with a letter and contain only letters, numbers and hyphens.

  NetworkStackName:
    Type: String
    Default: WordPress-CFN-Networking
    Description: Name of the networking stack that exports the VPC and subnet IDs.

  AmiId:
    Type: AWS::EC2::Image::Id
    Default: ami-07f60fb369cdbc889
    Description: AWS Academy us-east-1 lab-specific custom WordPress AMI created from the manually configured AMI server. Override outside the original lab environment.

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: vockey
    Description: AWS Academy Learner Lab key pair default. Override with an existing key pair outside the lab environment.

  InstanceType:
    Type: String
    Default: t2.micro
    AllowedValues:
      - t2.micro
      - t3.micro
    Description: EC2 instance type for WordPress web servers.

  WebMinSize:
    Type: String
    Default: "1"
    AllowedValues:
      - "1"
      - "2"
      - "3"
    Description: Minimum number of WordPress web instances. Default is cost-conscious for lab use.

  WebDesiredCapacity:
    Type: String
    Default: "1"
    AllowedValues:
      - "1"
      - "2"
      - "3"
    Description: Desired number of WordPress web instances. Set to 2 for a multi-instance web tier.

  WebMaxSize:
    Type: String
    Default: "3"
    AllowedValues:
      - "1"
      - "2"
      - "3"
    Description: Maximum number of WordPress web instances allowed by scaling policies.

  WordPressSiteTitle:
    Type: String
    Default: WordPress CloudFormation Project
    Description: WordPress site title used during automatic database bootstrap.
    AllowedPattern: "^[A-Za-z0-9][A-Za-z0-9 _.,:()'/-]{0,127}$"
    ConstraintDescription: Must contain 1 to 128 characters using letters, numbers, spaces, and common title punctuation.

  WordPressAdminUser:
    Type: String
    Description: WordPress administrator username.
    AllowedPattern: "^[A-Za-z][A-Za-z0-9_-]{2,31}$"
    ConstraintDescription: Must start with a letter and contain 3 to 32 letters, numbers, underscores, or hyphens.

  WordPressAdminEmail:
    Type: String
    Description: WordPress administrator email address.
    AllowedPattern: "^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$"
    ConstraintDescription: Must be a valid email address.

  DBName:
    Type: String
    Default: wordpressdb
    Description: WordPress database name.
    AllowedPattern: "^[a-zA-Z][a-zA-Z0-9]*$"

  DBUsername:
    Type: String
    Default: admin
    Description: RDS master username.
    AllowedPattern: "^[a-zA-Z][a-zA-Z0-9]*$"

  DBInstanceClass:
    Type: String
    Default: db.t3.micro
    AllowedValues:
      - db.t3.micro
      - db.t4g.micro
    Description: RDS instance class used by the original AWS Academy Learner Lab deployment.

  DBAllocatedStorage:
    Type: Number
    Default: 20
    MinValue: 20
    MaxValue: 100
    Description: RDS allocated storage in GiB.

  DBEngineVersion:
    Type: String
    Default: "8.0.40"
    Description: MySQL 8.0 engine version used by the original AWS Academy us-east-1 lab deployment.

  EnableRDSDeletionProtection:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Set to true to block accidental primary database deletion. The default remains false for cost-conscious lab teardown.

Conditions:
  EnableRDSDeletionProtectionCondition: !Equals [!Ref EnableRDSDeletionProtection, "true"]

Resources:
  # ---------------------------------------------------------------------------
  # Security groups
  # ---------------------------------------------------------------------------

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow public HTTP traffic to the Application Load Balancer.
      VpcId:
        Fn::ImportValue: !Sub "${NetworkStackName}-VpcId"
      SecurityGroupIngress:
        - Description: Public HTTP access to ALB
          IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - Description: Allow outbound traffic from ALB
          IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-ALB-SG"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Layer
          Value: Security
        - Key: ManagedBy
          Value: CloudFormation

  WebSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP to WordPress web servers only from the ALB security group.
      VpcId:
        Fn::ImportValue: !Sub "${NetworkStackName}-VpcId"
      SecurityGroupIngress:
        - Description: HTTP only from ALB security group
          IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSecurityGroup
      SecurityGroupEgress:
        - Description: Allow outbound traffic for RDS, S3, SSM and package access through NAT
          IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-Web-SG"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Layer
          Value: Security
        - Key: ManagedBy
          Value: CloudFormation

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow MySQL access only from WordPress web servers.
      VpcId:
        Fn::ImportValue: !Sub "${NetworkStackName}-VpcId"
      SecurityGroupIngress:
        - Description: MySQL from WordPress web security group only
          IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref WebSecurityGroup
      SecurityGroupEgress:
        - Description: Allow outbound traffic from RDS security group
          IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-RDS-SG"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Layer
          Value: Security
        - Key: ManagedBy
          Value: CloudFormation

  # ---------------------------------------------------------------------------
  # Private S3 media bucket
  # ---------------------------------------------------------------------------

  MediaBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Suspended
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-Media-Bucket"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Layer
          Value: Storage
        - Key: ManagedBy
          Value: CloudFormation

  MediaBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MediaBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !Sub "arn:aws:s3:::${MediaBucket}"
              - !Sub "arn:aws:s3:::${MediaBucket}/*"
            Condition:
              Bool:
                aws:SecureTransport: false

  # ---------------------------------------------------------------------------
  # Generated bootstrap secrets
  # ---------------------------------------------------------------------------

  DatabaseCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: Generated database credentials for the WordPress RDS primary.
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username":"${DBUsername}"}'
        GenerateStringKey: password
        PasswordLength: 32
        ExcludeCharacters: '"@/'
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-DB-Credentials"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Layer
          Value: Security
        - Key: ManagedBy
          Value: CloudFormation

  WordPressAdminCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: Generated WordPress administrator password used during initial bootstrap.
      GenerateSecretString:
        SecretStringTemplate: "{}"
        GenerateStringKey: password
        PasswordLength: 24
        ExcludeCharacters: '"@/'
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-WP-Admin-Credentials"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Layer
          Value: Security
        - Key: ManagedBy
          Value: CloudFormation

  # ---------------------------------------------------------------------------
  # RDS database tier
  # ---------------------------------------------------------------------------

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private subnet group for WordPress RDS instances.
      SubnetIds:
        - Fn::ImportValue: !Sub "${NetworkStackName}-PrivateSubnet1Id"
        - Fn::ImportValue: !Sub "${NetworkStackName}-PrivateSubnet2Id"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-DB-Subnet-Group"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Layer
          Value: Database
        - Key: ManagedBy
          Value: CloudFormation

  WordPressDB:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBName: !Ref DBName
      Engine: mysql
      EngineVersion: !Ref DBEngineVersion
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: !Ref DBAllocatedStorage
      StorageType: gp3
      StorageEncrypted: true
      MasterUsername: !Sub "{{resolve:secretsmanager:${DatabaseCredentialsSecret}:SecretString:username}}"
      MasterUserPassword: !Sub "{{resolve:secretsmanager:${DatabaseCredentialsSecret}:SecretString:password}}"
      MultiAZ: true
      PubliclyAccessible: false
      BackupRetentionPeriod: 7
      AutoMinorVersionUpgrade: true
      DeletionProtection: !If [EnableRDSDeletionProtectionCondition, true, false]
      CopyTagsToSnapshot: true
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-Primary-DB"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Layer
          Value: Database
        - Key: ManagedBy
          Value: CloudFormation

  WordPressDBReadReplica:
    Type: AWS::RDS::DBInstance
    # The replica is disposable and can be recreated from the protected primary.
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      SourceDBInstanceIdentifier: !Ref WordPressDB
      DBInstanceClass: !Ref DBInstanceClass
      AvailabilityZone: !Select [1, !GetAZs ""]
      PubliclyAccessible: false
      AutoMinorVersionUpgrade: true
      CopyTagsToSnapshot: true
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-Read-Replica"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Layer
          Value: Database
        - Key: ManagedBy
          Value: CloudFormation

  # ---------------------------------------------------------------------------
  # Application Load Balancer
  # ---------------------------------------------------------------------------

  WordPressTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Protocol: HTTP
      Port: 80
      TargetType: instance
      VpcId:
        Fn::ImportValue: !Sub "${NetworkStackName}-VpcId"
      HealthCheckEnabled: true
      HealthCheckProtocol: HTTP
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 2
      Matcher:
        HttpCode: "200-399"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-TG"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Layer
          Value: LoadBalancing
        - Key: ManagedBy
          Value: CloudFormation

  WordPressALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internet-facing
      Type: application
      IpAddressType: ipv4
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Subnets:
        - Fn::ImportValue: !Sub "${NetworkStackName}-PublicSubnet1Id"
        - Fn::ImportValue: !Sub "${NetworkStackName}-PublicSubnet2Id"
      LoadBalancerAttributes:
        - Key: deletion_protection.enabled
          Value: "false"
        - Key: idle_timeout.timeout_seconds
          Value: "60"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-ALB"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Layer
          Value: LoadBalancing
        - Key: ManagedBy
          Value: CloudFormation

  WordPressALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref WordPressALB
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref WordPressTargetGroup

  # ---------------------------------------------------------------------------
  # EC2 instance identity
  # ---------------------------------------------------------------------------

  # The original AWS Academy deployment used the externally provided
  # LabInstanceProfile. This portfolio template defines the role it needs so
  # secret access is explicit; restricted learner labs may need different IAM.
  WordPressInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ReadWordPressBootstrapSecrets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref DatabaseCredentialsSecret
                  - !Ref WordPressAdminCredentialsSecret
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-Instance-Role"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Layer
          Value: Security
        - Key: ManagedBy
          Value: CloudFormation

  WordPressInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref WordPressInstanceRole

  # ---------------------------------------------------------------------------
  # Launch Template and Auto Scaling Group
  # ---------------------------------------------------------------------------

  WordPressLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !Ref AmiId
        InstanceType: !Ref InstanceType
        KeyName: !Ref KeyName
        IamInstanceProfile:
          Name: !Ref WordPressInstanceProfile
        MetadataOptions:
          HttpEndpoint: enabled
          HttpTokens: required
        Monitoring:
          Enabled: true
        NetworkInterfaces:
          - DeviceIndex: 0
            AssociatePublicIpAddress: false
            Groups:
              - !Ref WebSecurityGroup
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub "${ProjectName}-ASG-Instance"
              - Key: Project
                Value: !Ref ProjectName
              - Key: Layer
                Value: Application
              - Key: ManagedBy
                Value: CloudFormation
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -Eeuo pipefail

            CONFIG_FILE="/var/www/html/wp-config.php"
            WEB_ROOT="/var/www/html"
            AWS_REGION="${AWS::Region}"
            DB_SECRET_ID="${DatabaseCredentialsSecret}"
            WP_ADMIN_SECRET_ID="${WordPressAdminCredentialsSecret}"
            DB_HOST="${WordPressDB.Endpoint.Address}"
            DB_NAME="${DBName}"
            WP_URL="http://${WordPressALB.DNSName}"
            WP_SITE_TITLE="${WordPressSiteTitle}"
            WP_ADMIN_USER="${WordPressAdminUser}"
            WP_ADMIN_EMAIL="${WordPressAdminEmail}"
            TMP_DIR=""
            PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
            export PATH

            log() {
              echo "[$(date -u '+%Y-%m-%dT%H:%M:%SZ')] $*"
            }

            fail() {
              echo "ERROR: $*" >&2
              exit 1
            }

            cleanup() {
              unset DB_PASSWORD DB_USERNAME
              if [ -n "$TMP_DIR" ] && [ -d "$TMP_DIR" ]; then
                rm -rf "$TMP_DIR"
              fi
            }

            require_command() {
              command -v "$1" >/dev/null 2>&1 || fail "Required command not found: $1"
            }

            get_secret() {
              local secret_id="$1"
              local output_file="$2"

              log "Retrieving bootstrap secret."
              aws secretsmanager get-secret-value \
                --region "$AWS_REGION" \
                --secret-id "$secret_id" \
                --query SecretString \
                --output text > "$output_file" || fail "Failed to retrieve required bootstrap secret."
              chmod 600 "$output_file"
            }

            read_json_key() {
              local file_path="$1"
              local key="$2"

              python3 - "$file_path" "$key" <<'PY'
            import json
            import sys

            file_path, key = sys.argv[1], sys.argv[2]
            with open(file_path, encoding="utf-8") as handle:
                value = json.load(handle).get(key)

            if not isinstance(value, str) or not value:
                raise SystemExit("Missing required secret field: " + key)

            print(value)
            PY
            }

            trap cleanup EXIT

            log "Installing required packages."
            dnf install -y php-gd wget curl python3

            if ! command -v aws >/dev/null 2>&1; then
              log "Installing AWS CLI."
              if ! dnf install -y awscli; then
                dnf install -y awscli2 || fail "Unable to install AWS CLI from available package repositories."
              fi
            fi

            require_command aws
            require_command curl
            require_command php
            require_command python3
            require_command sudo

            if ! command -v wp >/dev/null 2>&1; then
              log "Installing WP-CLI."
              curl --fail --location --silent --show-error https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar -o /usr/local/bin/wp
              chmod 755 /usr/local/bin/wp
            fi

            require_command wp

            TMP_DIR="$(mktemp -d)"
            chmod 700 "$TMP_DIR"
            DB_SECRET_FILE="$TMP_DIR/db-secret.json"
            WP_ADMIN_SECRET_FILE="$TMP_DIR/wp-admin-secret.json"
            WP_ADMIN_PASSWORD_FILE="$TMP_DIR/wp-admin-password"

            get_secret "$DB_SECRET_ID" "$DB_SECRET_FILE"
            get_secret "$WP_ADMIN_SECRET_ID" "$WP_ADMIN_SECRET_FILE"

            DB_USERNAME="$(read_json_key "$DB_SECRET_FILE" "username")"
            DB_PASSWORD="$(read_json_key "$DB_SECRET_FILE" "password")"
            read_json_key "$WP_ADMIN_SECRET_FILE" "password" > "$WP_ADMIN_PASSWORD_FILE"
            chmod 600 "$WP_ADMIN_PASSWORD_FILE"

            if [ -f "$CONFIG_FILE" ]; then
              export CONFIG_FILE DB_HOST DB_NAME DB_PASSWORD DB_USERNAME
              python3 <<'PY'
            import os
            import pathlib
            import re

            config_path = pathlib.Path(os.environ["CONFIG_FILE"])
            text = config_path.read_text(encoding="utf-8")

            def php_quote(value):
                return "'" + value.replace("\\", "\\\\").replace("'", "\\'") + "'"

            replacements = {
                "DB_NAME": os.environ["DB_NAME"],
                "DB_USER": os.environ["DB_USERNAME"],
                "DB_PASSWORD": os.environ["DB_PASSWORD"],
                "DB_HOST": os.environ["DB_HOST"],
            }

            for name, value in replacements.items():
                pattern = re.compile(r"define\(\s*'" + re.escape(name) + r"'\s*,\s*.*?\);")
                replacement = "define( '" + name + "', " + php_quote(value) + " );"
                text, count = pattern.subn(replacement, text, count=1)
                if count == 0:
                    raise SystemExit("Missing wp-config.php constant: " + name)

            marker = "/* That's all, stop editing! Happy publishing. */"
            additions = []
            if not re.search(r"define\(\s*'WP_HOME'", text):
                additions.append("define( 'WP_HOME', 'http://' . $_SERVER['HTTP_HOST'] );")
            if not re.search(r"define\(\s*'WP_SITEURL'", text):
                additions.append("define( 'WP_SITEURL', 'http://' . $_SERVER['HTTP_HOST'] );")

            if additions:
                insertion = "\n".join(additions) + "\n\n"
                if marker in text:
                    text = text.replace(marker, insertion + marker, 1)
                else:
                    text = text.rstrip() + "\n\n" + insertion

            config_path.write_text(text, encoding="utf-8")
            PY
              chmod 640 "$CONFIG_FILE"
            else
              fail "WordPress configuration file not found at $CONFIG_FILE."
            fi

            chown -R apache:apache "$WEB_ROOT"

            export DB_HOST DB_NAME DB_PASSWORD DB_USERNAME
            log "Waiting for database connectivity."
            db_ready=0
            for attempt in $(seq 1 30); do
              if php <<'PHP'
            <?php
            $connection = @new mysqli(getenv('DB_HOST'), getenv('DB_USERNAME'), getenv('DB_PASSWORD'), getenv('DB_NAME'), 3306);
            exit($connection->connect_errno ? 1 : 0);
            PHP
              then
                db_ready=1
                break
              fi
              sleep 10
            done

            if [ "$db_ready" -ne 1 ]; then
              fail "Timed out waiting for database connectivity."
            fi

            if ! sudo -u apache /usr/local/bin/wp core is-installed --path="$WEB_ROOT"; then
              log "Installing WordPress core."
              sudo -u apache /usr/local/bin/wp core install \
                --path="$WEB_ROOT" \
                --url="$WP_URL" \
                --title="$WP_SITE_TITLE" \
                --admin_user="$WP_ADMIN_USER" \
                --admin_email="$WP_ADMIN_EMAIL" \
                --prompt=admin_password < "$WP_ADMIN_PASSWORD_FILE"
            fi

            sudo -u apache /usr/local/bin/wp option update blog_public 0 --path="$WEB_ROOT" || true

            if sudo -u apache /usr/local/bin/wp plugin is-installed amazon-s3-and-cloudfront --path="$WEB_ROOT"; then
              sudo -u apache /usr/local/bin/wp plugin activate amazon-s3-and-cloudfront --path="$WEB_ROOT" || true
            fi

            systemctl enable php-fpm || true
            systemctl enable httpd
            systemctl restart php-fpm || true
            systemctl restart httpd

  WordPressAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    DependsOn:
      - WordPressALBListener
      - WordPressDB
    Properties:
      MinSize: !Ref WebMinSize
      MaxSize: !Ref WebMaxSize
      DesiredCapacity: !Ref WebDesiredCapacity
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300
      VPCZoneIdentifier:
        - Fn::ImportValue: !Sub "${NetworkStackName}-PrivateSubnet1Id"
        - Fn::ImportValue: !Sub "${NetworkStackName}-PrivateSubnet2Id"
      TargetGroupARNs:
        - !Ref WordPressTargetGroup
      LaunchTemplate:
        LaunchTemplateId: !Ref WordPressLaunchTemplate
        Version: !GetAtt WordPressLaunchTemplate.LatestVersionNumber
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-ASG-Instance"
          PropagateAtLaunch: true
        - Key: Project
          Value: !Ref ProjectName
          PropagateAtLaunch: true
        - Key: Layer
          Value: Application
          PropagateAtLaunch: true
        - Key: ManagedBy
          Value: CloudFormation
          PropagateAtLaunch: true

  # ---------------------------------------------------------------------------
  # CPU-based simple scaling policies: exact 70% / 25% task requirement
  # ---------------------------------------------------------------------------

  HighCPUScaleOutPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref WordPressAutoScalingGroup
      PolicyType: SimpleScaling
      AdjustmentType: ChangeInCapacity
      ScalingAdjustment: 1
      Cooldown: 300

  LowCPUScaleInPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref WordPressAutoScalingGroup
      PolicyType: SimpleScaling
      AdjustmentType: ChangeInCapacity
      ScalingAdjustment: -1
      Cooldown: 300

  HighCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Scale out WordPress ASG when average CPU is greater than or equal to 70 percent.
      Namespace: AWS/EC2
      MetricName: CPUUtilization
      Dimensions:
        - Name: AutoScalingGroupName
          Value: !Ref WordPressAutoScalingGroup
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 70
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref HighCPUScaleOutPolicy

  LowCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Scale in WordPress ASG when average CPU is less than or equal to 25 percent.
      Namespace: AWS/EC2
      MetricName: CPUUtilization
      Dimensions:
        - Name: AutoScalingGroupName
          Value: !Ref WordPressAutoScalingGroup
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 25
      ComparisonOperator: LessThanOrEqualToThreshold
      AlarmActions:
        - !Ref LowCPUScaleInPolicy

Outputs:
  ApplicationURL:
    Description: WordPress URL through the CloudFormation-created Application Load Balancer.
    Value: !Sub "http://${WordPressALB.DNSName}"

  LoadBalancerDNSName:
    Description: DNS name of the CloudFormation-created Application Load Balancer.
    Value: !GetAtt WordPressALB.DNSName

  TargetGroupArn:
    Description: Target group attached to the Auto Scaling Group.
    Value: !Ref WordPressTargetGroup

  LaunchTemplateId:
    Description: Launch Template ID used by the Auto Scaling Group.
    Value: !Ref WordPressLaunchTemplate

  AutoScalingGroupName:
    Description: Auto Scaling Group name.
    Value: !Ref WordPressAutoScalingGroup

  HighCPUAlarmName:
    Description: CloudWatch alarm for scale-out at 70 percent CPU.
    Value: !Ref HighCPUAlarm

  LowCPUAlarmName:
    Description: CloudWatch alarm for scale-in at 25 percent CPU.
    Value: !Ref LowCPUAlarm

  PrimaryDatabaseIdentifier:
    Description: Primary Multi-AZ RDS DB instance identifier.
    Value: !Ref WordPressDB

  PrimaryDatabaseEndpoint:
    Description: Primary RDS endpoint used by WordPress.
    Value: !GetAtt WordPressDB.Endpoint.Address

  ReadReplicaIdentifier:
    Description: Read replica DB instance identifier.
    Value: !Ref WordPressDBReadReplica

  MediaBucketName:
    Description: Private S3 bucket for WordPress media.
    Value: !Ref MediaBucket
